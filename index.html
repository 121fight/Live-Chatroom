<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Voice Rooms</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- Firebase v8 CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Agora Web SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.2.js"></script>
</head>
<body>

    <!-- Username Registration Modal -->
    <div id="auth-modal" class="modal flex-center">
        <div class="modal-content">
            <h2>Welcome</h2>
            <p>Enter a username to continue</p>
            <input type="text" id="username-input" placeholder="e.g. Rahul_07" maxlength="15">
            <button id="save-user-btn" class="btn primary-btn">Enter Chatrooms</button>
        </div>
    </div>

    <!-- Admin Action Modal -->
    <div id="admin-modal" class="modal flex-center hidden">
        <div class="modal-content admin-box">
            <h3 id="admin-target-name">User Options</h3>
            <button id="admin-mute-btn" class="btn warning-btn" onclick="app.executeAdminMute()">🔇 Mute User</button>
            <button id="admin-kick-btn" class="btn danger-btn" onclick="app.executeAdminKick()">🚷 Kick from Mic</button>
            <button class="btn secondary-btn" onclick="app.closeAdminModal()">Cancel</button>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <header class="home-header">
            <h2><i class="fas fa-microphone-alt"></i> Voice Rooms</h2>
            <div class="user-profile-mini">
                <img id="my-avatar" src="" alt="avatar">
            </div>
        </header>

        <div class="content-area">
            <div class="trending-section">
                <h3>Trending Now <i class="fas fa-fire" style="color: #ff5e00;"></i></h3>
                <!-- Minimized active room indicator -->
                <div id="minimized-widget" class="hidden" onclick="app.restoreRoom()">
                    <div class="widget-content">
                        <div class="pulse-ring"></div>
                        <span>Return to active room</span>
                    </div>
                </div>
            </div>

            <div class="rooms-list" id="rooms-list">
                <div class="loading-text">Loading rooms...</div>
            </div>
        </div>

        <button class="fab" onclick="app.createNewRoom()"><i class="fas fa-plus"></i></button>

        <nav class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item"><i class="fas fa-compass"></i><span>Explore</span></div>
            <div class="nav-item"><i class="fas fa-bell"></i><span>Alerts</span></div>
            <div class="nav-item"><i class="fas fa-user"></i><span>Profile</span></div>
        </nav>
    </div>

    <!-- Room Screen -->
    <div id="room-screen" class="screen">
        <!-- Full Screen Background Image -->
        <img id="room-bg" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1080&auto=format&fit=crop" alt="background">
        
        <!-- UI Wrapper for Glassmorphism -->
        <div class="room-ui-wrapper">
            <div class="room-header">
                <div class="room-actions">
                    <button class="icon-btn minimize-btn" onclick="app.minimizeRoom()" title="Minimize"><i class="fas fa-compress-alt"></i></button>
                    <div class="room-info">
                        <h3 id="current-room-title">Room Title</h3>
                        <span class="listener-count"><i class="fas fa-headphones"></i> <span id="room-listeners">0</span></span>
                    </div>
                    <div class="right-actions">
                        <button class="icon-btn share-btn" onclick="app.shareRoom()"><i class="fas fa-share-alt"></i></button>
                        <button class="icon-btn exit-btn" onclick="app.exitRoom()" title="Exit"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
            </div>

            <!-- 8 Mic Seats Grid -->
            <div class="mic-seats-container">
                <div class="mic-grid" id="mic-grid">
                    <!-- Seats generated by JS -->
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages -->
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="room-bottom-controls">
                <button id="mic-toggle-btn" class="control-btn mic-btn hidden" onclick="app.toggleMic()"><i class="fas fa-microphone-slash"></i></button>
                <form id="chat-form" class="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </form>
                <button class="control-btn emoji-btn" onclick="app.sendEmoji('❤️')">❤️</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <script src="firebase.js"></script>
    <script src="agora.js"></script>
    <script src="app.js"></script>
</body>
</html>
